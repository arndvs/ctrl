name: Feature request
description: Suggest an improvement to scripts, tooling, or architecture
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For skill requests use the Skill request template. This template is for changes to bootstrap, uninstall, detect-context, shft, or the repo structure.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you hit this limitation
      placeholder: |
        When I cd into a monorepo with both Next.js and Python packages,
        detect-context.sh only loads one context, not both.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
      description: Describe the behavior you want
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you tried or considered instead?
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Which component does this affect?
      options:
        - label: bootstrap.sh
        - label: uninstall.sh
        - label: detect-context.sh
        - label: run-with-secrets.sh
        - label: shft / AFK loop
        - label: Skills system
        - label: Agents
        - label: Repo structure / documentation
        - label: Other
