<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
    <title id="title">ctrl+shft — dotfiles for AI coding agents</title>
    <desc id="desc">Open Graph social image showing ctrl+shft branding, AI coding agent dotfiles message, and terminal-style highlights.</desc>

    <defs>
        <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
            <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#1e1e1e" stroke-width="1"/>
        </pattern>
        <radialGradient id="glow" cx="30%" cy="20%" r="70%">
            <stop offset="0%" stop-color="#e8ff47" stop-opacity="0.16"/>
            <stop offset="100%" stop-color="#e8ff47" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#e8ff47" stop-opacity="0"/>
            <stop offset="45%" stop-color="#e8ff47" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#e8ff47" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="640" fill="#080808"/>
    <rect width="1280" height="640" fill="url(#grid)"/>
    <rect width="1280" height="640" fill="url(#glow)"/>

    <line x1="88" y1="78" x2="1192" y2="78" stroke="#2e2e2e"/>
    <line x1="88" y1="562" x2="1192" y2="562" stroke="#2e2e2e"/>
    <line x1="88" y1="78" x2="88" y2="562" stroke="#2e2e2e"/>
    <line x1="1192" y1="78" x2="1192" y2="562" stroke="#2e2e2e"/>

    <rect x="132" y="124" width="700" height="392" rx="14" fill="#0f0f0f" stroke="#1e1e1e"/>
    <line x1="132" y1="176" x2="832" y2="176" stroke="#1e1e1e"/>
    <circle cx="166" cy="150" r="7" fill="#ff5f57"/>
    <circle cx="190" cy="150" r="7" fill="#febc2e"/>
    <circle cx="214" cy="150" r="7" fill="#28c840"/>

    <text x="174" y="228" fill="#e8ff47" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" letter-spacing="1.4">DOTFILES FOR AI CODING AGENTS</text>

    <text x="174" y="315" fill="#ffffff" font-family="'Bebas Neue', 'Arial Narrow', Impact, sans-serif" font-size="112" letter-spacing="3">ctrl</text>
    <text x="433" y="315" fill="#9f9fa9" font-family="'Bebas Neue', 'Arial Narrow', Impact, sans-serif" font-size="78" letter-spacing="2">+shft</text>

    <text x="174" y="372" fill="#d1d5dc" font-family="'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" letter-spacing="1">ctrl defines the rules.</text>
    <text x="174" y="412" fill="#d1d5dc" font-family="'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" letter-spacing="1">shft executes them.</text>

    <text x="174" y="468" fill="#9f9fa9" font-family="'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22">Persistent context • secret isolation • stack-aware instructions</text>

    <rect x="868" y="124" width="280" height="392" rx="14" fill="#0f0f0f" stroke="#1e1e1e"/>
    <line x1="868" y1="176" x2="1148" y2="176" stroke="#1e1e1e"/>
    <circle cx="898" cy="150" r="6" fill="#ff5f57"/>
    <circle cx="918" cy="150" r="6" fill="#febc2e"/>
    <circle cx="938" cy="150" r="6" fill="#28c840"/>

    <text x="892" y="214" fill="#555" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15">$ bootstrap</text>
    <text x="892" y="252" fill="#e8ff47" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15">git clone ... ~/dotfiles</text>
    <text x="892" y="282" fill="#44ff88" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15">✓ cloned</text>
    <text x="892" y="316" fill="#e8ff47" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15">bash bin/bootstrap.sh</text>
    <text x="892" y="346" fill="#44ff88" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15">✓ rules linked</text>
    <text x="892" y="376" fill="#44ff88" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15">✓ skills loaded</text>
    <text x="892" y="406" fill="#44ff88" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15">✓ secrets isolated</text>
    <text x="892" y="446" fill="#555" font-family="'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15"># ready</text>
    <rect x="957" y="433" width="8" height="18" fill="#e8ff47"/>

    <rect x="132" y="530" width="1016" height="4" fill="url(#accentLine)"/>
</svg>
